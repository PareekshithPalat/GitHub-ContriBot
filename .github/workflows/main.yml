name: Daily Contribution

on:
    push:
        branches:
            - main
    schedule:
        - cron: "30 2 * * *" # Run daily at 02:30 UTC
    workflow_dispatch: # Allow manual trigger

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write # Needed to push commits
            issues: write # Needed to create issues

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.9"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: Configure Git
              run: |
                  git config --global user.name "${{ secrets.COMMIT_USERNAME }}"
                  git config --global user.email "${{ secrets.COMMIT_EMAIL }}"

            - name: Run Automator Script
              env:
                  PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GH_USERNAME: ${{ secrets.COMMIT_USERNAME }}
              run: |
                  python Automator.py

            - name: Cleanup
              run: |
                   git checkout main
                   git pull origin main
